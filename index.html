<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY MAP</title>
    <style>
        :root {
            --primary: #2980b9;
            --primary-dark: #1f618d;
            --success: #2ecc71;
            --success-dark: #27ae60;
            --danger: #e74c3c;
            --danger-dark: #c0392b;
            --info: #8e44ad;
            --info-dark: #732d91;
            --bg-light: #f5f7fa;
            --text-dark: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 15px;
            background-color: var(--bg-light);
            color: var(--text-dark);
        }

        .header {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
        }

        @media (min-width: 900px) {
            .header {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
            }
        }

        .header h2 {
            margin: 0;
            font-size: 1.6rem;
            text-align: center;
        }

        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* STACKED LAYOUT: REGISTER TOP, MAP BOTTOM */
        .container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
        }

        .sidebar {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            width: 100%;
            box-sizing: border-box;
        }

        .map-panel {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            width: 100%;
            box-sizing: border-box;
        }

        .map-controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 12px;
            background: #f8f9fa;
            padding: 10px;
            border-radius: 6px;
        }

        @media (min-width: 576px) {
            .map-controls {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
            }
        }

        .zoom-controls {
            display: flex;
            align-items: center;
            gap: 8px;
            justify-content: center;
        }

        /* Fixed viewport for Map Zoom only */
        .map-area {
            position: relative;
            height: 500px;
            overflow: auto;
            border: 1px solid #ddd;
            border-radius: 4px;
            background: #e9ecef;
        }

        .map-wrapper {
            position: relative;
            display: inline-block;
            width: 100%;
            transition: width 0.2s ease;
        }

        #map-image {
            width: 100%;
            display: block;
            user-select: none;
            -webkit-user-drag: none;
        }

        .table-container {
            width: 100%;
            overflow-x: auto;
            margin-top: 15px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 850px; 
        }

        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
            font-size: 13px;
        }

        th {
            background-color: #f8fafc;
            font-weight: 600;
        }

        .required-star {
            color: var(--danger);
            margin-left: 2px;
        }

        .input-cell {
            width: 90%;
            padding: 5px 8px;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            font-size: 13px;
            text-transform: uppercase; 
            box-sizing: border-box;
        }

        .input-cell:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* Map Markers */
        .marker {
            position: absolute;
            width: 24px;
            height: 24px;
            background-color: var(--primary);
            color: white;
            border-radius: 50%;
            text-align: center;
            line-height: 24px;
            font-size: 11px;
            font-weight: bold;
            transform: translate(-50%, -50%);
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            border: 2px solid white;
            user-select: none;
            z-index: 5;
        }

        .marker:hover {
            transform: translate(-50%, -50%) scale(1.1);
            background-color: var(--danger);
        }

        /* Spinner Overlay */
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.85);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.2);
            border-top: 5px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .progress-container {
            width: 250px;
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            overflow: hidden;
            height: 8px;
            margin-bottom: 10px;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background-color: #3498db;
            transition: width 0.1s ease-out;
        }

        /* Buttons */
        button {
            padding: 8px 14px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: background 0.2s ease;
        }
        .btn-save { background-color: var(--success); color: white; }
        .btn-save:hover { background-color: var(--success-dark); }
        .btn-load { background-color: var(--primary); color: white; }
        .btn-load:hover { background-color: var(--primary-dark); }
        .btn-clear { background-color: var(--danger); color: white; }
        .btn-clear:hover { background-color: var(--danger-dark); }
        .btn-print { background-color: var(--info); color: white; }
        .btn-print:hover { background-color: var(--info-dark); }
        .btn-zoom { background-color: #64748b; color: white; padding: 5px 10px; }
        .btn-zoom:hover { background-color: #475569; }

        /* ========================================================
           PRINT STYLES
           ======================================================== */
        @media print {
            body {
                background: white !important;
                color: black !important;
                padding: 0 !important;
                margin: 0 !important;
            }
            .header, .map-controls, .button-group, .btn-clear, .zoom-controls, .btn-print, button {
                display: none !important;
            }
            .container {
                display: flex !important;
                flex-direction: column !important;
                width: 100% !important;
                gap: 10px !important;
            }
            .map-panel, .sidebar {
                box-shadow: none !important;
                border: none !important;
                padding: 0 !important;
                margin: 0 !important;
                width: 100% !important;
                background: transparent !important;
            }
            .map-area {
                overflow: visible !important;
                border: none !important;
                background: transparent !important;
            }
            .map-wrapper {
                width: 100% !important;
            }
            table {
                min-width: 100% !important;
            }
            input, select {
                border: none !important;
                background: transparent !important;
                padding: 2px !important;
                appearance: none; /* Hide dropdown arrow on paper */
            }

            body.print-mode-a4 {
                width: 100%;
            }
            body.print-mode-a4 .container {
                page-break-inside: avoid;
            }
            body.print-mode-a4 .map-area {
                height: 300px !important; 
            }

            body.print-mode-a3 {
                width: 100%;
            }
            body.print-mode-a3 .sidebar {
                display: none !important;
            }
            body.print-mode-a3 .map-area {
                height: 100% !important;
                max-height: none !important;
            }
        }
    </style>
</head>
<body>

    <!-- Busy Spinner Overlay -->
    <div id="loading-overlay" class="overlay">
        <div class="spinner"></div>
        <div id="status-text" style="font-weight: 600; margin-bottom: 10px; font-size: 15px;">Saving Data...</div>
        <div class="progress-container">
            <div id="progress-bar" class="progress-bar"></div>
        </div>
        <div id="percentage-text" style="font-size: 14px; font-weight: bold;">0%</div>
    </div>

    <div class="header">
        <h2>MY MAP</h2>
        <div class="button-group">
            <button onclick="loadFromCloud()" class="btn-load">Sync..</button>
            <button onclick="saveToCloud()" class="btn-save">Save..</button>
            <button onclick="printA4()" class="btn-print">Print A4</button>
            <button onclick="printA3()" class="btn-print" style="background-color: var(--info-dark)">Prin A3</button>
        </div>
    </div>

    <div class="container">
        <!-- Building Register Form (TOP) -->
        <div class="sidebar">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3 style="margin: 0; font-size: 1.2rem;">Register</h3>
                <button onclick="clearAll()" class="btn-clear" style="padding: 5px 10px; font-size: 11px;">Reset Local</button>
            </div>
            
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 6%">Sl No</th>
                            <th style="width: 20%">Name<span class="required-star">*</span></th>
                            <th style="width: 14%">Phone (10 Digits)<span class="required-star">*</span></th>
                            <th style="width: 10%">Bldg No<span class="required-star">*</span></th>
                            <th style="width: 10%">CN No (0001 Format)<span class="required-star">*</span></th>
                            <th style="width: 18%">Pucca/Katcha/Others<span class="required-star">*</span></th>
                            <th style="width: 22%">Remarks<span class="required-star">*</span></th>
                        </tr>
                    </thead>
                    <tbody id="register-body">
                        <!-- Rows generated dynamically -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Map Panel (BOTTOM) -->
        <div class="map-panel">
            <div class="map-controls">
                <span style="font-size: 11px; font-weight: 600; color: #64748b; text-align: center;">
                    Click map to mark. Double-click marker to delete. Zoom strictly scales map view only.
                </span>
                <div class="zoom-controls">
                    <strong>Zoom Map:</strong>
                    <button onclick="zoomOut()" class="btn-zoom">-</button>
                    <span id="zoom-text" style="font-size: 13px; font-weight: bold; min-width: 45px; text-align: center;">100%</span>
                    <button onclick="zoomIn()" class="btn-zoom">+</button>
                    <button onclick="zoomReset()" class="btn-zoom" style="background-color: #475569;">Reset</button>
                </div>
            </div>
            
            <div class="map-area" id="map-scroll-container">
                <div class="map-wrapper" id="map-wrapper">
                    <img id="map-image" src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiThD8osmhs81FJK2Leasb2ZLwbOMXuVZiI09fRwcmpqlDul-vVEBtXGj4ldqv8DYhpfCCrIum1j_eJVcxGFVY2G1RU7Xb_ie2dFjxyLdKzb1-qUxeTfIY44ipuGgslS9GZvIiCnS_qJQQMBOBTe7AvV4FHxYemNwlpBfLB1PxTsZZczlEAMwyj3Lk4aEDe/s1600/D.png" alt="HLB Map Boundary" onerror="this.src='https://via.placeholder.com/800x500.png?text=Please+upload+your+map.png+to+GitHub'">
                    
                    <svg id="arrow-svg" style="position: absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:1;" viewBox="0 0 100 100" preserveAspectRatio="none">
                        <defs>
                            <marker id="arrow" viewBox="0 0 10 10" refX="14" refY="5" markerWidth="4" markerHeight="4" orient="auto-start-reverse">
                                <path d="M 0 1.5 L 10 5 L 0 8.5 z" fill="#e74c3c" />
                            </marker>
                        </defs>
                        <g id="svg-paths"></g>
                    </svg>

                    <div id="marker-layer"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // PASTE YOUR GOOGLE APPS SCRIPT WEB APP URL HERE:
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxSSqI5sQWkXlQVrphxjmQe_pWvytoaCADqVu-MU4ulaXdTTNzePoS7OhNLQjXniEJzXw/exec";
        // ==========================================

        const mapImage = document.getElementById('map-image');
        const mapWrapper = document.getElementById('map-wrapper');
        const markerLayer = document.getElementById('marker-layer');
        const registerBody = document.getElementById('register-body');
        const zoomText = document.getElementById('zoom-text');
        const svgPaths = document.getElementById('svg-paths');
        
        const loadingOverlay = document.getElementById('loading-overlay');
        const statusText = document.getElementById('status-text');
        const progressBar = document.getElementById('progress-bar');
        const percentageText = document.getElementById('percentage-text');

        let markers = [];
        let markerCounter = 1;
        let currentZoom = 100;

        window.onload = function() {
            if (GOOGLE_SCRIPT_URL !== "YOUR_DEPLOYED_WEB_APP_URL_HERE") {
                loadFromCloud();
            }
        };

        // ZOOM CONTROLS
        function zoomIn() {
            if (currentZoom < 500) {
                currentZoom += 25;
                updateZoom();
            }
        }
        function zoomOut() {
            if (currentZoom > 50) {
                currentZoom -= 25;
                updateZoom();
            }
        }
        function zoomReset() {
            currentZoom = 100;
            updateZoom();
        }
        function updateZoom() {
            mapWrapper.style.width = `${currentZoom}%`;
            zoomText.innerText = `${currentZoom}%`;
        }

        // BUSY SPINNER & SLIDE PROGRESS
        function showBusyProgress(title, onFinishedAction) {
            loadingOverlay.style.display = 'flex';
            statusText.innerText = title;
            progressBar.style.width = '0%';
            percentageText.innerText = '0%';
            
            let percent = 0;
            const interval = setInterval(() => {
                if (percent < 90) {
                    percent += Math.floor(Math.random() * 8) + 2; 
                    if (percent > 90) percent = 90;
                    progressBar.style.width = `${percent}%`;
                    percentageText.innerText = `${percent}%`;
                }
            }, 100);

            onFinishedAction().then(() => {
                clearInterval(interval);
                progressBar.style.width = '100%';
                percentageText.innerText = '100%';
                setTimeout(() => {
                    loadingOverlay.style.display = 'none';
                }, 400);
            }).catch((err) => {
                clearInterval(interval);
                loadingOverlay.style.display = 'none';
                alert("Operation failed: " + err);
            });
        }

        // SINGLE-PAGE PRINT UTILITY
        function triggerPrint(sizeClass, pageSize) {
            const printStyle = document.createElement('style');
            printStyle.id = "print-page-style";
            printStyle.innerHTML = `@media print { @page { size: ${pageSize} landscape; margin: 5mm; } }`;
            document.head.appendChild(printStyle);

            document.body.classList.add(sizeClass);

            setTimeout(() => {
                window.print();
                document.body.classList.remove(sizeClass);
                const styleToRemove = document.getElementById("print-page-style");
                if (styleToRemove) styleToRemove.remove();
            }, 250);
        }

        function printA4() {
            if (!validateAllFields()) return;
            triggerPrint('print-mode-a4', 'A4');
        }

        function printA3() {
            triggerPrint('print-mode-a3', 'A3');
        }

        // ADD MARKER ON CLICK
        mapImage.addEventListener('click', function(e) {
            const rect = mapImage.getBoundingClientRect();
            const xPercent = ((e.clientX - rect.left) / rect.width) * 100;
            const yPercent = ((e.clientY - rect.top) / rect.height) * 100;

            const nextIndex = markers.length + 1;
            // Pad index with leading zeros to meet 0001 format
            const formattedCN = String(nextIndex).padStart(4, '0');

            const newMarker = {
                id: markerCounter,
                x: xPercent,
                y: yPercent,
                slNo: nextIndex,
                name: '',
                phone: '',
                buildingNo: `${nextIndex}`,
                cnNo: formattedCN, // Default format 0001 (editable)
                note: '', // Maps to Pucca/Katcha/Others dropdown value
                remarks: ''
            };

            markers.push(newMarker);
            markerCounter++;
            render();
        });

        // VALIDATION CHECK FOR COMPULSORY FIELDS
        function validateAllFields() {
            if (markers.length === 0) {
                alert("There are no registered buildings to validate.");
                return false;
            }

            for (let i = 0; i < markers.length; i++) {
                const m = markers[i];
                const row = i + 1;

                if (!m.name || m.name.trim() === "") {
                    alert(`Save Blocked: Sl No ${row} is missing 'Owner Name'.`);
                    return false;
                }
                if (!m.phone || m.phone.trim() === "") {
                    alert(`Save Blocked: Sl No ${row} is missing 'Phone Number'.`);
                    return false;
                }
                if (m.phone.length !== 10) {
                    alert(`Save Blocked: Sl No ${row} has an invalid Phone Number. It must be exactly 10 digits.`);
                    return false;
                }
                if (!m.buildingNo || m.buildingNo.trim() === "") {
                    alert(`Save Blocked: Sl No ${row} is missing 'Building No'.`);
                    return false;
                }
                if (!m.cnNo || m.cnNo.trim() === "") {
                    alert(`Save Blocked: Sl No ${row} is missing 'CN No'.`);
                    return false;
                }
                if (!m.note || m.note.trim() === "") {
                    alert(`Save Blocked: Sl No ${row} is missing 'Pucca/Katcha/Others' selection.`);
                    return false;
                }
                if (!m.remarks || m.remarks.trim() === "") {
                    alert(`Save Blocked: Sl No ${row} is missing 'Remarks'.`);
                    return false;
                }
            }
            return true;
        }

        // RENDER METHOD
        function render() {
            markerLayer.innerHTML = '';
            registerBody.innerHTML = '';
            svgPaths.innerHTML = ''; 

            markers.forEach((marker, index) => {
                marker.slNo = index + 1;

                // 1. Draw Map Marker Element
                const markerEl = document.createElement('div');
                markerEl.className = 'marker';
                markerEl.style.left = `${marker.x}%`;
                markerEl.style.top = `${marker.y}%`;
                markerEl.innerText = marker.slNo;
                markerEl.title = `Double-click to remove Sl No ${marker.slNo}`;
                
                markerEl.addEventListener('dblclick', (e) => {
                    e.stopPropagation();
                    removeMarker(index);
                });

                markerLayer.appendChild(markerEl);

                // 2. Draw SVG Route Line (Narrow stroke: 0.2 viewBox scale)
                if (index < markers.length - 1) {
                    const nextMarker = markers[index + 1];
                    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    line.setAttribute("x1", marker.x);
                    line.setAttribute("y1", marker.y);
                    line.setAttribute("x2", nextMarker.x);
                    line.setAttribute("y2", nextMarker.y);
                    line.setAttribute("stroke", "#e74c3c");
                    line.setAttribute("stroke-width", "0.2");
                    line.setAttribute("marker-end", "url(#arrow)");
                    svgPaths.appendChild(line);
                }

                // 3. Create Table Row
                const row = document.createElement('tr');

                // Sl No
                const cellSl = document.createElement('td');
                cellSl.style.fontWeight = "bold";
                cellSl.innerText = marker.slNo;

                // Name (Forced to Capitals)
                const cellName = document.createElement('td');
                const inputName = document.createElement('input');
                inputName.className = 'input-cell';
                inputName.value = marker.name || '';
                inputName.placeholder = 'OWNER NAME';
                inputName.addEventListener('input', (e) => {
                    e.target.value = e.target.value.toUpperCase();
                    marker.name = e.target.value;
                });
                cellName.appendChild(inputName);

                // Phone (Numeric filter + 10-Digit limit)
                const cellPhone = document.createElement('td');
                const inputPhone = document.createElement('input');
                inputPhone.className = 'input-cell';
                inputPhone.type = 'text';
                inputPhone.maxLength = 10;
                inputPhone.value = marker.phone || '';
                inputPhone.placeholder = '10 DIGITS';
                inputPhone.addEventListener('input', (e) => {
                    let digits = e.target.value.replace(/[^0-9]/g, ''); 
                    e.target.value = digits;
                    marker.phone = digits;
                });
                cellPhone.appendChild(inputPhone);

                // Building No (Forced to Capitals)
                const cellBldg = document.createElement('td');
                const inputBldg = document.createElement('input');
                inputBldg.className = 'input-cell';
                inputBldg.value = marker.buildingNo || '';
                inputBldg.placeholder = 'BUILDING NO';
                inputBldg.addEventListener('input', (e) => {
                    e.target.value = e.target.value.toUpperCase();
                    marker.buildingNo = e.target.value;
                });
                cellBldg.appendChild(inputBldg);

                // CN No (Automatic Default Format 0001 & Editable)
                const cellCN = document.createElement('td');
                const inputCN = document.createElement('input');
                inputCN.className = 'input-cell';
                inputCN.value = marker.cnNo || '';
                inputCN.placeholder = '0001';
                inputCN.addEventListener('input', (e) => {
                    e.target.value = e.target.value.toUpperCase();
                    marker.cnNo = e.target.value;
                });
                cellCN.appendChild(inputCN);

                // Pucca/Katcha/Others Select Dropdown (Stored in marker.note)
                const cellNote = document.createElement('td');
                const selectNote = document.createElement('select');
                selectNote.className = 'input-cell';
                
                const optDefault = document.createElement('option');
                optDefault.value = '';
                optDefault.innerText = '-- SELECT --';
                selectNote.appendChild(optDefault);

                ['PUCCA', 'KATCHA', 'OTHERS'].forEach(val => {
                    const opt = document.createElement('option');
                    opt.value = val;
                    opt.innerText = val;
                    if (marker.note === val) {
                        opt.selected = true;
                    }
                    selectNote.appendChild(opt);
                });

                selectNote.addEventListener('change', (e) => {
                    marker.note = e.target.value;
                });
                cellNote.appendChild(selectNote);

                // Remarks (Forced to Capitals)
                const cellRemarks = document.createElement('td');
                const inputRemarks = document.createElement('input');
                inputRemarks.className = 'input-cell';
                inputRemarks.value = marker.remarks || '';
                inputRemarks.placeholder = 'REMARKS';
                inputRemarks.addEventListener('input', (e) => {
                    e.target.value = e.target.value.toUpperCase();
                    marker.remarks = e.target.value;
                });
                cellRemarks.appendChild(inputRemarks);

                row.appendChild(cellSl);
                row.appendChild(cellName);
                row.appendChild(cellPhone);
                row.appendChild(cellBldg);
                row.appendChild(cellCN);
                row.appendChild(cellNote);
                row.appendChild(cellRemarks);

                registerBody.appendChild(row);
            });
        }

        function removeMarker(index) {
            markers.splice(index, 1);
            render();
        }

        function clearAll() {
            if (confirm("Reset local modifications? This clears your screen. Database remains unchanged unless you push to save.")) {
                markers = [];
                markerCounter = 1;
                render();
            }
        }

        // SAVE DATA (POST)
        function saveToCloud() {
            if (GOOGLE_SCRIPT_URL === "YOUR_DEPLOYED_WEB_APP_URL_HERE") {
                alert("Please write your Apps Script URL into the constant variable first.");
                return;
            }

            if (!validateAllFields()) return; 

            const sendAction = () => {
                return fetch(GOOGLE_SCRIPT_URL, {
                    method: "POST",
                    mode: "no-cors",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(markers)
                });
            };

            showBusyProgress("Saving Changes to Google Sheets...", sendAction);
        }

        // LOAD DATA (GET)
        function loadFromCloud() {
            if (GOOGLE_SCRIPT_URL === "YOUR_DEPLOYED_WEB_APP_URL_HERE") return;

            const fetchAction = () => {
                return fetch(GOOGLE_SCRIPT_URL)
                    .then(response => response.json())
                    .then(data => {
                        if (data && data.length > 0) {
                            markers = data;
                            markerCounter = Math.max(...markers.map(m => parseInt(m.id) || 0)) + 1;
                            render();
                        }
                    });
            };

            showBusyProgress("Fetching Data from Google Sheets...", fetchAction);
        }
    </script>
</body>
</html>
