<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Mapper</title>
    <style>
        :root {
            --primary: #2980b9;
            --primary-dark: #1f618d;
            --success: #2ecc71;
            --success-dark: #27ae60;
            --danger: #e74c3c;
            --danger-dark: #c0392b;
            --bg-light: #f5f7fa;
            --text-dark: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 15px;
            background-color: var(--bg-light);
            color: var(--text-dark);
        }

        .header {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
        }

        @media (min-width: 768px) {
            .header {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
            }
        }

        .header h2 {
            margin: 0;
            font-size: 1.6rem;
            text-align: center;
        }

        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        @media (min-width: 1024px) {
            .container {
                flex-direction: row;
                align-items: flex-start;
            }
        }

        .map-panel {
            flex: 1.5;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            width: 100%;
            box-sizing: border-box;
        }

        .map-controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 12px;
            background: #f8f9fa;
            padding: 10px;
            border-radius: 6px;
        }

        @media (min-width: 576px) {
            .map-controls {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
            }
        }

        .zoom-controls {
            display: flex;
            align-items: center;
            gap: 8px;
            justify-content: center;
        }

        .map-area {
            position: relative;
            max-height: 65vh;
            overflow: auto;
            border: 1px solid #ddd;
            border-radius: 4px;
            background: #e9ecef;
        }

        .map-wrapper {
            position: relative;
            display: inline-block;
            width: 100%;
            transition: width 0.2s ease;
        }

        #map-image {
            width: 100%;
            display: block;
            user-select: none;
            -webkit-user-drag: none;
        }

        .sidebar {
            flex: 1.8;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            width: 100%;
            box-sizing: border-box;
            max-height: 85vh;
            overflow-y: auto;
        }

        /* Responsive Scrollable Table Container */
        .table-container {
            width: 100%;
            overflow-x: auto;
            margin-top: 15px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px; /* Forces horizontal scrolling on mobile to protect inputs */
        }

        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
            font-size: 13px;
        }

        th {
            background-color: #f8fafc;
            font-weight: 600;
        }

        .input-cell {
            width: 90%;
            padding: 5px 8px;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            font-size: 13px;
        }

        .input-cell:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* Markers */
        .marker {
            position: absolute;
            width: 26px;
            height: 26px;
            background-color: var(--primary);
            color: white;
            border-radius: 50%;
            text-align: center;
            line-height: 26px;
            font-size: 11px;
            font-weight: bold;
            transform: translate(-50%, -50%);
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            border: 2px solid white;
            user-select: none;
        }

        .marker:hover {
            transform: translate(-50%, -50%) scale(1.1);
            background-color: var(--danger);
        }

        /* Progress Overlay & Spinner */
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.85);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.2);
            border-top: 5px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .progress-container {
            width: 250px;
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            overflow: hidden;
            height: 8px;
            margin-bottom: 10px;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background-color: #3498db;
            transition: width 0.1s ease-out;
        }

        /* Buttons Styling */
        button {
            padding: 8px 14px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: background 0.2s ease;
        }
        .btn-save { background-color: var(--success); color: white; }
        .btn-save:hover { background-color: var(--success-dark); }
        .btn-load { background-color: var(--primary); color: white; }
        .btn-load:hover { background-color: var(--primary-dark); }
        .btn-clear { background-color: var(--danger); color: white; }
        .btn-clear:hover { background-color: var(--danger-dark); }
        .btn-zoom { background-color: #64748b; color: white; padding: 5px 10px; }
        .btn-zoom:hover { background-color: #475569; }
    </style>
</head>
<body>

    <!-- Busy Spinner & Progress Slide Overlay -->
    <div id="loading-overlay" class="overlay">
        <div class="spinner"></div>
        <div id="status-text" style="font-weight: 600; margin-bottom: 10px; font-size: 15px;">Saving Data...</div>
        <div class="progress-container">
            <div id="progress-bar" class="progress-bar"></div>
        </div>
        <div id="percentage-text" style="font-size: 14px; font-weight: bold;">0%</div>
    </div>

    <div class="header">
        <h2>My Portal</h2>
        <div class="button-group">
            <button onclick="loadFromCloud()" class="btn-load">Sync from Sheet</button>
            <button onclick="saveToCloud()" class="btn-save">Save to Sheet</button>
        </div>
    </div>

    <div class="container">
        <!-- Map Panel -->
        <div class="map-panel">
            <div class="map-controls">
                <span style="font-size: 12px; font-weight: 600; color: #64748b; text-align: center;">
                    Click map to mark. Double-click marker to delete.
                </span>
                <div class="zoom-controls">
                    <strong>Zoom:</strong>
                    <button onclick="zoomOut()" class="btn-zoom">-</button>
                    <span id="zoom-text" style="font-size: 13px; font-weight: bold; min-width: 45px; text-align: center;">100%</span>
                    <button onclick="zoomIn()" class="btn-zoom">+</button>
                    <button onclick="zoomReset()" class="btn-zoom" style="background-color: #475569;">Reset</button>
                </div>
            </div>
            
            <div class="map-area" id="map-scroll-container">
                <div class="map-wrapper" id="map-wrapper">
                    <img id="map-image" src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiThD8osmhs81FJK2Leasb2ZLwbOMXuVZiI09fRwcmpqlDul-vVEBtXGj4ldqv8DYhpfCCrIum1j_eJVcxGFVY2G1RU7Xb_ie2dFjxyLdKzb1-qUxeTfIY44ipuGgslS9GZvIiCnS_qJQQMBOBTe7AvV4FHxYemNwlpBfLB1PxTsZZczlEAMwyj3Lk4aEDe/s1600/D.png" alt="HLB Map Boundary" onerror="this.src='https://via.placeholder.com/800x500.png?text=Please+upload+your+map.png+to+GitHub'">
                    <div id="marker-layer"></div>
                </div>
            </div>
        </div>

        <!-- Building Register Sidebar Form -->
        <div class="sidebar">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3 style="margin: 0; font-size: 1.2rem;">Building Register</h3>
                <button onclick="clearAll()" class="btn-clear" style="padding: 5px 10px; font-size: 11px;">Reset Local</button>
            </div>
            
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 6%">Sl No</th>
                            <th style="width: 20%">Name</th>
                            <th style="width: 15%">Phone</th>
                            <th style="width: 12%">Bldg No</th>
                            <th style="width: 12%">CN No</th>
                            <th style="width: 15%">Notes/Type</th>
                            <th style="width: 20%">Remarks</th>
                        </tr>
                    </thead>
                    <tbody id="register-body">
                        <!-- Dynamic rows are inserted here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // PASTE YOUR GOOGLE APPS SCRIPT WEB APP URL HERE:
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxSSqI5sQWkXlQVrphxjmQe_pWvytoaCADqVu-MU4ulaXdTTNzePoS7OhNLQjXniEJzXw/exec";
        // ==========================================

        const mapImage = document.getElementById('map-image');
        const mapWrapper = document.getElementById('map-wrapper');
        const markerLayer = document.getElementById('marker-layer');
        const registerBody = document.getElementById('register-body');
        const zoomText = document.getElementById('zoom-text');
        
        // Progress Overlay elements
        const loadingOverlay = document.getElementById('loading-overlay');
        const statusText = document.getElementById('status-text');
        const progressBar = document.getElementById('progress-bar');
        const percentageText = document.getElementById('percentage-text');

        let markers = [];
        let markerCounter = 1;
        let currentZoom = 100;

        window.onload = function() {
            if (GOOGLE_SCRIPT_URL !== "YOUR_DEPLOYED_WEB_APP_URL_HERE") {
                loadFromCloud();
            }
        };

        // ZOOM CONTROLS
        function zoomIn() {
            if (currentZoom < 500) {
                currentZoom += 25;
                updateZoom();
            }
        }
        function zoomOut() {
            if (currentZoom > 50) {
                currentZoom -= 25;
                updateZoom();
            }
        }
        function zoomReset() {
            currentZoom = 100;
            updateZoom();
        }
        function updateZoom() {
            mapWrapper.style.width = `${currentZoom}%`;
            zoomText.innerText = `${currentZoom}%`;
        }

        // BUSY SPINNER & SLIDE PROGRESS SIMULATION
        function showBusyProgress(title, onFinishedAction) {
            loadingOverlay.style.display = 'flex';
            statusText.innerText = title;
            progressBar.style.width = '0%';
            percentageText.innerText = '0%';
            
            let percent = 0;
            // Simulated incremental progress
            const interval = setInterval(() => {
                if (percent < 90) {
                    percent += Math.floor(Math.random() * 8) + 2; 
                    if (percent > 90) percent = 90;
                    progressBar.style.width = `${percent}%`;
                    percentageText.innerText = `${percent}%`;
                }
            }, 100);

            // Trigger actual network/process action
            onFinishedAction().then(() => {
                clearInterval(interval);
                // Force to 100% on complete
                progressBar.style.width = '100%';
                percentageText.innerText = '100%';
                setTimeout(() => {
                    loadingOverlay.style.display = 'none';
                }, 400);
            }).catch((err) => {
                clearInterval(interval);
                loadingOverlay.style.display = 'none';
                alert("Operation failed: " + err);
            });
        }

        // ADD MARKER ON CLICK
        mapImage.addEventListener('click', function(e) {
            const rect = mapImage.getBoundingClientRect();
            const xPercent = ((e.clientX - rect.left) / rect.width) * 100;
            const yPercent = ((e.clientY - rect.top) / rect.height) * 100;

            const newMarker = {
                id: markerCounter,
                x: xPercent,
                y: yPercent,
                slNo: markers.length + 1,
                name: '',
                phone: '',
                buildingNo: `${markers.length + 1}`,
                cnNo: '',
                note: '',
                remarks: ''
            };

            markers.push(newMarker);
            markerCounter++;
            render();
        });

        // RENDER METHOD
        function render() {
            markerLayer.innerHTML = '';
            registerBody.innerHTML = '';

            markers.forEach((marker, index) => {
                // Update sequential Sl No
                marker.slNo = index + 1;

                // Create Marker Element
                const markerEl = document.createElement('div');
                markerEl.className = 'marker';
                markerEl.style.left = `${marker.x}%`;
                markerEl.style.top = `${marker.y}%`;
                markerEl.innerText = marker.slNo;
                markerEl.title = `Double-click to remove Sl No ${marker.slNo}`;
                
                markerEl.addEventListener('dblclick', (e) => {
                    e.stopPropagation();
                    removeMarker(index);
                });

                markerLayer.appendChild(markerEl);

                // Create Table Row
                const row = document.createElement('tr');

                // 1. Sl No
                const cellSl = document.createElement('td');
                cellSl.style.fontWeight = "bold";
                cellSl.innerText = marker.slNo;

                // 2. Name
                const cellName = document.createElement('td');
                const inputName = document.createElement('input');
                inputName.className = 'input-cell';
                inputName.value = marker.name || '';
                inputName.addEventListener('input', (e) => marker.name = e.target.value);
                cellName.appendChild(inputName);

                // 3. Phone
                const cellPhone = document.createElement('td');
                const inputPhone = document.createElement('input');
                inputPhone.className = 'input-cell';
                inputPhone.type = 'tel';
                inputPhone.value = marker.phone || '';
                inputPhone.addEventListener('input', (e) => marker.phone = e.target.value);
                cellPhone.appendChild(inputPhone);

                // 4. Building No
                const cellBldg = document.createElement('td');
                const inputBldg = document.createElement('input');
                inputBldg.className = 'input-cell';
                inputBldg.value = marker.buildingNo || '';
                inputBldg.addEventListener('input', (e) => marker.buildingNo = e.target.value);
                cellBldg.appendChild(inputBldg);

                // 5. CN No
                const cellCN = document.createElement('td');
                const inputCN = document.createElement('input');
                inputCN.className = 'input-cell';
                inputCN.value = marker.cnNo || '';
                inputCN.addEventListener('input', (e) => marker.cnNo = e.target.value);
                cellCN.appendChild(inputCN);

                // 6. Notes / Type
                const cellNote = document.createElement('td');
                const inputNote = document.createElement('input');
                inputNote.className = 'input-cell';
                inputNote.value = marker.note || '';
                inputNote.addEventListener('input', (e) => marker.note = e.target.value);
                cellNote.appendChild(inputNote);

                // 7. Remarks
                const cellRemarks = document.createElement('td');
                const inputRemarks = document.createElement('input');
                inputRemarks.className = 'input-cell';
                inputRemarks.value = marker.remarks || '';
                inputRemarks.addEventListener('input', (e) => marker.remarks = e.target.value);
                cellRemarks.appendChild(inputRemarks);

                row.appendChild(cellSl);
                row.appendChild(cellName);
                row.appendChild(cellPhone);
                row.appendChild(cellBldg);
                row.appendChild(cellCN);
                row.appendChild(cellNote);
                row.appendChild(cellRemarks);

                registerBody.appendChild(row);
            });
        }

        function removeMarker(index) {
            markers.splice(index, 1);
            render();
        }

        function clearAll() {
            if (confirm("Reset local modifications? This clears your screen. Database remains unchanged unless you push to save.")) {
                markers = [];
                markerCounter = 1;
                render();
            }
        }

        // SAVE DATA (POST)
        function saveToCloud() {
            if (GOOGLE_SCRIPT_URL === "YOUR_DEPLOYED_WEB_APP_URL_HERE") {
                alert("Please write your Apps Script URL into the constant variable first.");
                return;
            }

            const sendAction = () => {
                return fetch(GOOGLE_SCRIPT_URL, {
                    method: "POST",
                    mode: "no-cors",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(markers)
                });
            };

            showBusyProgress("Saving Changes...", sendAction);
        }

        // LOAD DATA (GET)
        function loadFromCloud() {
            if (GOOGLE_SCRIPT_URL === "YOUR_DEPLOYED_WEB_APP_URL_HERE") return;

            const fetchAction = () => {
                return fetch(GOOGLE_SCRIPT_URL)
                    .then(response => response.json())
                    .then(data => {
                        if (data && data.length > 0) {
                            markers = data;
                            markerCounter = Math.max(...markers.map(m => parseInt(m.id) || 0)) + 1;
                            render();
                        }
                    });
            };

            showBusyProgress("Fetching Data...", fetchAction);
        }
    </script>
</body>
</html>
